<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitFlow - Obsidian Forge Final</title>
<style>
:root {
    --bg-obsidian: #050505;
    --silver-chrome: #cbd5e1;
    --gold-leaf: #c6a75e;
    --steel-border: #1e293b;
    --damascus: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3Base%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.015' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)' opacity='0.12'/%3E%3C/svg%3E");
}

body {
    margin: 0; font-family: 'Garamond', serif;
    background-color: var(--bg-obsidian); background-image: var(--damascus);
    color: var(--silver-chrome); overflow-x: hidden; transition: 0.5s;
}

/* ===== MORTALITY CLOCK ===== */
.mortality-section { padding: 10px 25px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #222; font-size: 0.7rem; letter-spacing: 2px; }
.m-bar-bg { background: #111; height: 4px; width: 100%; margin-top: 5px; }
#mBarFill { background: var(--silver-chrome); height: 100%; width: 100%; box-shadow: 0 0 10px #fff; transition: 1s; }

/* ===== NEURAL VOID (FOCUS MODE) ===== */
.void-active .dashboard, .void-active .graph-box, .void-active h1, .void-active h3, .void-active .daily-heatmap {
    display: none !important;
}
.void-active #appPage { padding-top: 100px; }

/* ===== APP UI ===== */
#appPage { display: none; padding: 25px; max-width: 1400px; margin: auto; }
.header-ui { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
input, select { background: #000; border: 1px solid var(--steel-border); color: var(--silver-chrome); padding: 12px; }

.forge-btn { background: var(--gold-leaf); border: none; padding: 12px 30px; cursor: pointer; font-weight: bold; color: #000; }
.void-btn { background: #111; color: var(--gold-leaf); border: 1px solid var(--gold-leaf); padding: 12px; cursor: pointer; }

.dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
.stat-card { background: rgba(10,10,10,0.9); border: 1px solid #222; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold-leaf); }

/* THE MATRIX */
.matrix-scroll { overflow-x: auto; background: rgba(0,0,0,0.95); border: 1px solid #222; margin-bottom: 35px; }
table { border-collapse: collapse; width: 100%; font-size: 13px; }
th, td { border: 1px solid #1a1a1a; padding: 15px 8px; text-align: center; }
td:first-child { position: sticky; left: 0; background: #070707; z-index: 10; border-right: 2px solid var(--gold-leaf); text-align: left; min-width: 200px; }

/* CUSTOM CHECKBOX */
input[type="checkbox"] { 
    appearance: none; width: 22px; height: 22px; background: white; border-radius: 3px; cursor: pointer; position: relative; 
}
input[type="checkbox"]:checked::after {
    content: '✔'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold-leaf); font-weight: bold;
}

.graph-box { background: #000; border: 1px solid #222; padding: 25px; }
</style>
</head>
<body id="masterBody">

<div id="welcomePage" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <h1 style="font-size:5rem; letter-spacing:15px; margin:0;">HABITFLOW</h1>
    <button style="margin-top:50px; padding:20px 70px; background:transparent; border:1px solid var(--gold-leaf); color:var(--gold-leaf); cursor:pointer;" onclick="igniteForge()">BEGIN TRACKING</button>
</div>

<div id="appPage">
    <div class="mortality-section">
        <span id="mortalityText">MEMENTO MORI: 100.00% OF YEAR REMAINING</span>
        <div class="m-bar-bg"><div id="mBarFill"></div></div>
    </div>

    <div class="header-ui" style="margin-top:30px;">
        <input type="text" id="hName" placeholder="TRACK HABIT...">
        <button class="forge-btn" onclick="addHabit()">FORGE</button>
        <button class="void-btn" onclick="toggleVoid()">NEURAL VOID</button>
    </div>

    <div class="dashboard">
        <div class="stat-card"><h3>RANK</h3><p id="rank">INITIATIVE</p></div>
        <div class="stat-card"><h3>XP</h3><p id="xpCounter">0</p></div>
        <div class="stat-card"><h3>STREAK</h3><p id="streak">0</p></div>
        <div class="stat-card"><h3>EFFICIENCY</h3><p id="eff">0%</p></div>
    </div>

    <div class="matrix-scroll">
        <table>
            <thead><tr id="mHead"></tr></thead>
            <tbody id="mBody"></tbody>
        </table>
    </div>

    <div class="graph-box">
        <h3 style="color:var(--gold-leaf); font-size:0.8rem; letter-spacing:3px;">ECHO OF FAILURE vs GOLDEN WAVEFORM</h3>
        <canvas id="lineChart" width="1200" height="320"></canvas>
    </div>
</div>

<script>
let habits = JSON.parse(localStorage.getItem("habits_final_v10")) || [];
let xp = parseInt(localStorage.getItem("xp_v10")) || 0;
let bestMonth = JSON.parse(localStorage.getItem("best_month")) || [10, 20, 40, 30, 60, 80, 70, 90, 100]; // Echo data
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, dur) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
    osc.stop(audioCtx.currentTime + dur);
}

function igniteForge(){
    document.getElementById("welcomePage").style.display="none";
    document.getElementById("appPage").style.display="block";
    updateMortality(); render();
}

function updateMortality() {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 1);
    const end = new Date(now.getFullYear() + 1, 0, 1);
    const percent = 100 - (((now - start) / (end - start)) * 100);
    document.getElementById("mBarFill").style.width = percent + "%";
    document.getElementById("mortalityText").innerText = `MEMENTO MORI: ${percent.toFixed(4)}% OF YEAR REMAINING`;
    setTimeout(updateMortality, 1000);
}

function toggleVoid() {
    document.body.classList.toggle("void-active");
    playSound(100, 'square', 0.1);
}

function addHabit(){
    let n = document.getElementById("hName").value.toUpperCase();
    if(!n) return;
    habits.push({ id: Date.now(), name: n, logs: {} });
    playSound(150, 'sine', 0.2);
    render();
}

function toggleLog(hid, date) {
    let h = habits.find(x => x.id === hid);
    h.logs[date] = !h.logs[date];
    if(h.logs[date]) { xp += 25; playSound(800, 'sine', 0.1); playSound(1200, 'sine', 0.15); }
    else { xp -= 25; playSound(200, 'sawtooth', 0.1); }
    localStorage.setItem("habits_final_v10", JSON.stringify(habits));
    localStorage.setItem("xp_v10", xp);
    render();
}

function render() {
    const head = document.getElementById("mHead");
    const body = document.getElementById("mBody");
    const dates = []; for(let i=0; i<31; i++){ let d = new Date(); d.setDate(d.getDate()+i); dates.push(d.toISOString().slice(0,10)); }

    head.innerHTML = "<th>PROTOCOL</th>";
    dates.forEach(d => head.innerHTML += `<th>${new Date(d).getDate()}</th>`);

    body.innerHTML = "";
    habits.forEach(h => {
        let row = `<tr><td>${h.name}</td>`;
        dates.forEach(d => row += `<td><input type="checkbox" ${h.logs[d]?'checked':''} onchange="toggleLog(${h.id},'${d}')"></td>`);
        body.innerHTML += row + "</tr>";
    });

    const eff = habits.length ? Math.round((habits.filter(h => h.logs[new Date().toISOString().slice(0,10)]).length/habits.length)*100) : 0;
    document.getElementById("eff").innerText = eff + "%";
    document.getElementById("xpCounter").innerText = xp;
    document.getElementById("rank").innerText = ["INITIATIVE", "SENTINEL", "ELITE", "GHOST"][Math.min(Math.floor(xp/1000),3)];
    drawGraph(dates);
}

function drawGraph(dates) {
    const canvas = document.getElementById("lineChart"); const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const pad = 60; const w = canvas.width - pad*2; const h = canvas.height - pad*2;
    
    // Echo of Failure (Silver Line)
    ctx.setLineDash([5, 5]); ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
    ctx.beginPath();
    bestMonth.forEach((v, i) => {
        let x = pad + (i * (w/30)); let y = canvas.height - pad - (v/100 * h);
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke(); ctx.setLineDash([]);

    // Golden Waveform
    ctx.strokeStyle = "#c6a75e"; ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor = "#c6a75e";
    ctx.beginPath();
    dates.forEach((d, i) => {
        let perc = (habits.filter(h => h.logs[d]).length / habits.length) * 100 || 0;
        let x = pad + (i * (w/30)); let y = canvas.height - pad - (perc/100 * h);
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke(); ctx.shadowBlur = 0;
}
</script>
</body>
</html>
